<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>InternSpace - Pengaturan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Material+Symbols+Outlined:FILL@0..1" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="shared-config.js"></script>
  <style>
    body { font-family: Inter, sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-canvas text-slate-900">
  <main class="mx-auto max-w-3xl p-5 md:p-10">
    <a href="index.html" class="inline-flex items-center gap-1 text-sm font-semibold text-primary hover:underline">
      ← Kembali ke Dasbor
    </a>
    <header class="mt-7">
      <p class="text-sm font-semibold uppercase tracking-wider text-primary">Preferensi akun</p>
      <h1 class="mt-2 font-geist text-3xl font-bold">Pengaturan</h1>
      <p class="mt-2 text-slate-600">Atur pengalaman InternSpace sesuai preferensi Anda.</p>
    </header>
    <section class="mt-8 space-y-4">
      <article class="rounded-2xl border border-line bg-white p-5">
        <h2 class="font-geist text-lg font-bold">Bahasa</h2>
        <p class="mt-1 text-sm text-slate-600">Pilih bahasa tampilan portal.</p>
        <select id="language" class="mt-4 w-full rounded-lg border border-line px-3 py-2">
          <option value="id">Bahasa Indonesia</option>
          <option value="en">English</option>
        </select>
      </article>
      <article class="rounded-2xl border border-line bg-white p-5">
        <h2 class="font-geist text-lg font-bold">Gerakan & performa</h2>
        <p class="mt-1 text-sm text-slate-600">Kurangi animasi agar lebih nyaman dan hemat daya.</p>
        <select id="motion" class="mt-4 w-full rounded-lg border border-line px-3 py-2">
          <option value="auto">Ikuti perangkat</option>
          <option value="reduce">Kurangi animasi</option>
        </select>
      </article>
      <article class="rounded-2xl border border-red-200 bg-white p-5">
        <h2 class="font-geist text-lg font-bold">Data lokal Kanban</h2>
        <p class="mt-1 text-sm text-slate-600">Hapus semua project dan task yang tersimpan pada browser ini.</p>
        <button id="reset" class="mt-4 rounded-lg border border-red-300 px-4 py-2 text-sm font-bold text-red-700 hover:bg-red-50 transition-colors">Reset data Kanban</button>
      </article>
    </section>
  </main>
  <div id="toast" class="fixed bottom-5 right-5 hidden rounded-lg bg-slate-900 px-4 py-3 text-sm font-semibold text-white"></div>
  <script src="lang.js"></script>
  <script src="language-ui.js"></script>
  <script src="performance.js"></script>
  <script>
    const toast = document.getElementById('toast');
    const show = m => {
      toast.textContent = m;
      toast.classList.remove('hidden');
      setTimeout(() => toast.classList.add('hidden'), 2200);
    };
    const language = document.getElementById('language');
    const motion = document.getElementById('motion');
    language.value = localStorage.getItem('internspace-lang') || 'id';
    motion.value = localStorage.getItem('internspace-motion') || 'auto';
    language.onchange = () => {
      localStorage.setItem('internspace-lang', language.value);
      if (window.I18n) window.I18n.setLang(language.value);
      show('Preferensi bahasa disimpan.');
    };
    motion.onchange = () => {
      localStorage.setItem('internspace-motion', motion.value);
      document.documentElement.classList.toggle('reduce-motion', motion.value === 'reduce');
      show('Preferensi gerakan disimpan.');
    };
    document.getElementById('reset').onclick = () => {
      if (confirm('Reset semua project dan task Kanban lokal?')) {
        localStorage.removeItem('internspace-projects-v1');
        show('Data Kanban sudah direset.');
      }
    };
  </script>
</body>
</html>
